<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — {{ tenant.brand_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/admin.css">
  <style>
    :root { --primary: {{ tenant.primary_color or '#3b82f6' }}; }
  </style>
</head>
<body>

<div class="admin-layout">

  <!-- ============================================================
       SIDEBAR
       ============================================================ -->
  <aside class="admin-sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
      {% if tenant.logo_url %}
        <img src="{{ tenant.logo_url }}" alt="{{ tenant.brand_name }}">
      {% else %}
        <div style="width:32px;height:32px;border-radius:6px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0;">
          {{ (tenant.brand_name or 'G')[0] }}
        </div>
      {% endif %}
      <div>
        <div class="sidebar-brand-name">{{ tenant.brand_name }}</div>
        <div class="sidebar-brand-sub">Admin Panel</div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">

      <button class="nav-item" data-panel="overview">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span>Platform Overview</span>
      </button>

      <button class="nav-item" data-panel="users">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>User Management</span>
      </button>

      <button class="nav-item" data-panel="guest_db">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
        </svg>
        <span>Guest Database</span>
      </button>

      <button class="nav-item" data-panel="moderation">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>Report Moderation</span>
      </button>

      <button class="nav-item" data-panel="search_system">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>Search System</span>
      </button>

      <button class="nav-item" data-panel="billing">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/>
        </svg>
        <span>Billing &amp; Subscriptions</span>
      </button>

      <button class="nav-item" data-panel="verification">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span>Verification System</span>
      </button>

      <button class="nav-item" data-panel="system_admin">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M19.07 4.93l-1.41 1.41M4.93 19.07l1.41-1.41"/>
          <path d="M12 2v2m0 18v-2M2 12h2m18 0h-2"/>
        </svg>
        <span>System Administration</span>
      </button>

      <button class="nav-item" data-panel="tenant_mgmt">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Tenant Management</span>
      </button>

      <button class="nav-item" data-panel="performance">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span>Site Performance</span>
      </button>

      <button class="nav-item" data-panel="ai_assistant">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 0 1 10 10c0 4-2.5 7.4-6 9l-4 1-4-1c-3.5-1.6-6-5-6-9A10 10 0 0 1 12 2z"/>
          <path d="M8 12h8M12 8v8"/>
        </svg>
        <span>AI Assistant</span>
      </button>

    </nav>

    <!-- Admin user footer -->
    <div class="sidebar-footer">
      <div class="admin-user-card">
        <div class="admin-avatar">
          {{ (user.email or 'A')[0].upper() }}
        </div>
        <div class="admin-user-info">
          <div class="admin-user-name">{{ user.email or 'Admin' }}</div>
          <div class="admin-user-role">Administrator</div>
        </div>
      </div>
      <a href="/logout" class="logout-link">Sign Out</a>
    </div>

  </aside>

  <!-- ============================================================
       MAIN
       ============================================================ -->
  <div class="admin-main">

    <!-- Topbar -->
    <div class="admin-topbar">
      <div class="topbar-left">
        <h1 id="panel-title">Platform Overview</h1>
      </div>
      <div class="topbar-right">
        <span class="admin-clock" id="admin-clock"></span>
        <div class="tenant-badge">
          <div class="tenant-badge-dot" style="background:{{ tenant.primary_color or '#3b82f6' }}"></div>
          {{ tenant.brand_name }}
        </div>
      </div>
    </div>

    <!-- Loading spinner (position:absolute, shown over content) -->
    <div id="loading-spinner">
      <div class="spinner"></div>
    </div>

    <!-- Scrollable content area -->
    <div class="admin-content">
      <div id="panel-content" style="padding:0;"></div>
    </div>

  </div><!-- /.admin-main -->

</div><!-- /.admin-layout -->

<script src="/static/js/admin.js" defer></script>
</body>
</html>
