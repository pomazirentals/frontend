<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — {{ tenant.brand_name }}</title>
  <link rel="stylesheet" href="/static/css/auth.css">
  <style>:root { --primary: {{ tenant.primary_color }}; }</style>
</head>
<body>
  <div class="auth-card">

    {% if tenant.logo_url %}
    <img src="{{ tenant.logo_url }}" alt="{{ tenant.brand_name }}" class="auth-logo">
    {% else %}
    <div class="auth-brand-name">{{ tenant.brand_name }}</div>
    {% endif %}

    <h1 class="auth-heading">Forgot password</h1>
    <p class="auth-subheading">Enter your email and we'll send a reset link</p>

    {% if sent %}
    <div class="banner banner-success">
      If that email is registered, a reset link has been sent.
    </div>
    {% endif %}

    <form method="post" action="/forgot-password">
      <div class="field-group">
        <input type="email" name="email" placeholder="Email" required autocomplete="email">
      </div>
      <button type="submit" class="btn-primary" style="margin-top:24px;">SEND RESET LINK</button>
    </form>

    <div class="bottom-link">
      <a href="/login">← Back to sign in</a>
    </div>
  </div>
</body>
</html>
