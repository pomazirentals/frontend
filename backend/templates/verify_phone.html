<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Phone — {{ tenant.brand_name }}</title>
  <link rel="stylesheet" href="/static/css/auth.css">
  <style>:root { --primary: {{ tenant.primary_color }}; }</style>
</head>
<body>
  <div class="auth-card" style="text-align:center;">

    {% if tenant.logo_url %}
    <img src="{{ tenant.logo_url }}" alt="{{ tenant.brand_name }}" class="auth-logo">
    {% else %}
    <div class="auth-brand-name">{{ tenant.brand_name }}</div>
    {% endif %}

    <div style="margin:0 auto 20px;width:64px;height:64px;background:#eff6ff;border-radius:50%;display:flex;align-items:center;justify-content:center;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="{{ tenant.primary_color }}" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
        </svg>
    </div>
    <h1 class="auth-heading">Verify your phone</h1>
    <p class="auth-subheading" style="margin-bottom:24px;">
    We sent an SMS with a 6-digit code to <strong>{{ phone }}</strong>.<br>Enter it below to activate your account.
    </p>

    {% if error %}
    <div class="banner banner-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/verify-phone">
        <div class="field-group">
            <input type="text" name="code" placeholder="123456" required autocomplete="one-time-code" style="text-align:center;font-size:1.25rem;letter-spacing:4px;">
        </div>
        <button type="submit" class="btn-primary" style="margin-top:24px;width:100%;">VERIFY CODE</button>
    </form>

    <div class="bottom-link" style="margin-top:20px;">
      <a href="/login">← Back to sign in</a>
    </div>
  </div>
</body>
</html>
